<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #00c853;
      --green-d: #00a040;
      --green-g: #00e676;
      --dark:    #0a0f0a;
      --card:    #111a11;
      --border:  #1e3a1e;
      --text:    #e8f5e9;
      --muted:   #6a8f6a;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,200,83,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,83,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    .orb-1 {
      width: 300px; height: 300px;
      background: rgba(0,200,83,.12);
      top: -80px; left: -80px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 250px; height: 250px;
      background: rgba(0,230,118,.08);
      bottom: -60px; right: -60px;
      animation-delay: 3s;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1);   opacity: .7; }
      50%      { transform: scale(1.2); opacity: 1; }
    }

    /* card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 10;
      box-shadow:
        0 0 0 1px rgba(0,200,83,.06),
        0 30px 80px rgba(0,0,0,.6),
        0 0 60px rgba(0,200,83,.04);
      animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* top glow line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      border-radius: 50%;
    }

    /* logo area */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #0d2a14, #1a4a1a);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 30px rgba(0,200,83,.15);
    }

    .logo-icon svg {
      width: 30px; height: 30px;
      color: var(--green);
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(0,200,83,.3), transparent 60%);
      pointer-events: none;
    }

    .logo-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: .5px;
    }

    .logo-title span { color: var(--green); }

    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: -6px;
    }

    /* label */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: .3px;
    }

    /* input group */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color .3s;
    }

    .toggle-eye {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      transition: color .2s;
    }
    .toggle-eye:hover { color: var(--green); }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,.4);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 44px 14px 44px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .3s, box-shadow .3s;
      direction: ltr;
      text-align: right;
    }

    input:focus {
      border-color: var(--green-d);
      box-shadow: 0 0 0 3px rgba(0,200,83,.1);
    }

    input:focus ~ .input-icon { color: var(--green); }

    /* strength bar */
    .strength-wrap {
      margin-top: -12px;
      margin-bottom: 20px;
    }

    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width .4s, background .4s;
    }

    .strength-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      text-align: left;
      direction: ltr;
    }

    /* button */
    button.submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--green-d), var(--green));
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(0,200,83,.25);
    }

    button.submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,200,83,.35);
    }

    button.submit-btn:active { transform: translateY(0); }

    button.submit-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), transparent);
    }

    button.submit-btn .btn-text { position: relative; z-index: 1; }

    /* spinner */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* message */
    #message {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 600;
      text-align: center;
      display: none;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

    #message.success {
      background: rgba(0,200,83,.1);
      border: 1px solid rgba(0,200,83,.25);
      color: var(--green-g);
      display: block;
    }
    #message.error {
      background: rgba(255,60,60,.08);
      border: 1px solid rgba(255,60,60,.2);
      color: #ff6b6b;
      display: block;
    }

    /* requirements list */
    .req-list {
      margin-top: -8px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .req {
      font-size: 11.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .3s;
    }

    .req.met { color: var(--green); }

    .req-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="logo-title"><span>WE</span>‑Core</div>
    <div class="logo-sub">إعادة تعيين كلمة المرور</div>
  </div>

  <label for="password">كلمة المرور الجديدة</label>
  <div class="input-group">
    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <input type="password" id="password" placeholder="أدخل كلمة مرور قوية" autocomplete="new-password" oninput="checkStrength(this.value)">
    <button class="toggle-eye" type="button" onclick="toggleVis('password', this)" title="إظهار/إخفاء">
      <svg id="eye-pw" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="strength-wrap">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="strength-label" id="strength-label"></div>
  </div>

  <div class="req-list">
    <span class="req" id="req-len"><span class="req-dot"></span>٨ أحرف على الأقل</span>
    <span class="req" id="req-upper"><span class="req-dot"></span>حرف كبير</span>
    <span class="req" id="req-num"><span class="req-dot"></span>رقم</span>
    <span class="req" id="req-sym"><span class="req-dot"></span>رمز خاص</span>
  </div>

  <label for="confirm">تأكيد كلمة المرور</label>
  <div class="input-group">
    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    <input type="password" id="confirm" placeholder="أعد إدخال كلمة المرور" autocomplete="new-password">
    <button class="toggle-eye" type="button" onclick="toggleVis('confirm', this)" title="إظهار/إخفاء">
      <svg id="eye-cf" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <button class="submit-btn" onclick="resetPassword()">
    <span class="btn-text" id="btn-text">تحديث كلمة المرور</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <p id="message"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    "https://iygwhapcpdmsasqlfelv.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Z3doYXBjcGRtc2FzcWxmZWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDk5MDQsImV4cCI6MjA4NjkyNTkwNH0.jqU1fEc9kBkXcCfazH6aTnS2XWWzPv0bbixHZgjtrnQ"
  );

  /* eye toggle */
  function toggleVis(id, btn) {
    const inp = document.getElementById(id);
    const isHidden = inp.type === 'password';
    inp.type = isHidden ? 'text' : 'password';
    btn.querySelector('svg').style.opacity = isHidden ? '.5' : '1';
  }

  /* strength check */
  function checkStrength(val) {
    const len   = val.length >= 8;
    const upper = /[A-Z]/.test(val);
    const num   = /[0-9]/.test(val);
    const sym   = /[^A-Za-z0-9]/.test(val);

    toggle('req-len',   len);
    toggle('req-upper', upper);
    toggle('req-num',   num);
    toggle('req-sym',   sym);

    const score = [len, upper, num, sym].filter(Boolean).length;
    const fill  = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');

    const levels = [
      { w: '0%',   bg: 'transparent', lbl: '' },
      { w: '25%',  bg: '#ff4444',     lbl: 'ضعيفة' },
      { w: '50%',  bg: '#ff9800',     lbl: 'مقبولة' },
      { w: '75%',  bg: '#ffeb3b',     lbl: 'جيدة' },
      { w: '100%', bg: '#00c853',     lbl: 'قوية جداً ✓' },
    ];

    fill.style.width      = levels[score].w;
    fill.style.background = levels[score].bg;
    label.textContent     = levels[score].lbl;
    label.style.color     = levels[score].bg;
  }

  function toggle(id, met) {
    document.getElementById(id).classList.toggle('met', met);
  }

  /* reset password */
  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const msg      = document.getElementById('message');

    msg.className = '';
    msg.style.display = 'none';

    if (!password) {
      showMsg('الرجاء إدخال كلمة المرور', 'error');
      return;
    }
    if (password.length < 8) {
      showMsg('كلمة المرور قصيرة جداً — يجب أن تكون ٨ أحرف على الأقل', 'error');
      return;
    }
    if (password !== confirm) {
      showMsg('كلمتا المرور غير متطابقتين', 'error');
      return;
    }

    setLoading(true);

    const { data, error } = await _supabase.auth.updateUser({ password });

    setLoading(false);

    if (error) {
      showMsg('حدث خطأ: ' + error.message, 'error');
    } else {
      showMsg('✓  تم تحديث كلمة المرور بنجاح!', 'success');
      document.getElementById('password').value = '';
      document.getElementById('confirm').value  = '';
      checkStrength('');
    }
  }

  function setLoading(on) {
    document.getElementById('btn-text').style.display = on ? 'none' : '';
    document.getElementById('spinner').style.display  = on ? 'block' : 'none';
  }

  function showMsg(text, type) {
    const msg = document.getElementById('message');
    msg.textContent  = text;
    msg.className    = type;
  }
</script>
</body>
</html>
